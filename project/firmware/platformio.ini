; PlatformIO Project Configuration File for DreamVision ESP32 Thermal Firmware
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Library dependencies
lib_deps =
    adafruit/Adafruit MLX90640 @ ^1.0.2     ; MLX90640 32x24 IR thermal camera
    adafruit/Adafruit GFX Library @ ^1.11.5  ; Core graphics library for drawing pixels
    https://github.com/adafruit/Adafruit-ST7735-Library ; ST7789 TFT LCD display driver
    adafruit/Adafruit BusIO @ ^1.14.1        ; Required dependency for Adafruit libraries

; Build flags (optional – uncomment to enable verbose WiFi debug)
; build_flags =
;     -DDEBUG_ESP_WIFI
;     -DDEBUG_ESP_PORT=Serial
